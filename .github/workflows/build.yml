name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.9/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          GARMIN_CONSUMER_KEY: ${{ secrets.GARMIN_CONSUMER_KEY }}
          GARMIN_CONSUMER_SECRET: ${{ secrets.GARMIN_CONSUMER_SECRET }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RunConnect-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "RunConnect Build ${{ github.run_number }}"
          body: |
            **Build from:** ${{ github.sha }}

            ## Install on phone
            1. Download `RunConnect-debug.apk` below
            2. On Android: Settings → Security → Install unknown apps → Allow from your browser/Files app
            3. Open the downloaded APK

            ## First-time setup in the app
            - Grant Health Connect permissions when prompted
            - In Garmin Connect app: make sure "Sync to Health Connect" is enabled
            - In Withings app: make sure "Sync to Health Connect" is enabled
            - In Settings tab: add your Mapbox public token for 3D maps (free at account.mapbox.com)
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
